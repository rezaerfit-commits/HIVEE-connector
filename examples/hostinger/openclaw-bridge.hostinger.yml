# Add this service to the same Hostinger project/network as OpenClaw.
# It forwards 0.0.0.0:18790 to 127.0.0.1:18789 inside the OpenClaw network namespace.

services:
  gateway-bridge:
    image: alpine:3.20
    network_mode: "service:openclaw"
    command: >
      sh -c "apk add --no-cache socat &&
      socat TCP-LISTEN:18790,fork,bind=0.0.0.0,reuseaddr TCP:127.0.0.1:18789"
    depends_on:
      - openclaw
    restart: unless-stopped
